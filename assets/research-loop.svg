<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="245" viewBox="0 0 1200 245" role="img" aria-labelledby="title desc">
  <title id="title">Research workflow</title>
  <desc id="desc">A five-stage workflow: reproduce, map, probe, diagnose, improve and verify.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="245" rx="22" fill="#F8FAFC"/>
  <path d="M126 116H1073" stroke="url(#line)" stroke-width="5" stroke-linecap="round" opacity="0.75"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <g transform="translate(125 116)" filter="url(#shadow)">
      <circle r="48" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="3"/>
      <text y="-5" font-size="15" font-weight="700" fill="#0F172A">REPRODUCE</text>
      <text y="16" font-size="12" fill="#475569">baseline first</text>
    </g>

    <g transform="translate(365 116)" filter="url(#shadow)">
      <circle r="48" fill="#DBEAFE" stroke="#3B82F6" stroke-width="3"/>
      <text y="-5" font-size="15" font-weight="700" fill="#0F172A">MAP</text>
      <text y="16" font-size="12" fill="#475569">tokens to objects</text>
    </g>

    <g transform="translate(600 116)" filter="url(#shadow)">
      <circle r="48" fill="#E0E7FF" stroke="#6366F1" stroke-width="3"/>
      <text y="-5" font-size="15" font-weight="700" fill="#0F172A">PROBE</text>
      <text y="16" font-size="12" fill="#475569">hidden geometry</text>
    </g>

    <g transform="translate(835 116)" filter="url(#shadow)">
      <circle r="48" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="3"/>
      <text y="-5" font-size="15" font-weight="700" fill="#0F172A">DIAGNOSE</text>
      <text y="16" font-size="12" fill="#475569">find failure source</text>
    </g>

    <g transform="translate(1075 116)" filter="url(#shadow)">
      <circle r="48" fill="#F3E8FF" stroke="#A855F7" stroke-width="3"/>
      <text y="-5" font-size="15" font-weight="700" fill="#0F172A">VERIFY</text>
      <text y="16" font-size="12" fill="#475569">causal evidence</text>
    </g>

    <g font-size="24" font-weight="700" fill="#64748B">
      <text x="245" y="124">›</text>
      <text x="482" y="124">›</text>
      <text x="718" y="124">›</text>
      <text x="956" y="124">›</text>
    </g>
  </g>

  <text x="600" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-size="14" fill="#475569">
    Controlled evidence before architectural claims
  </text>

  <rect x="1.5" y="1.5" width="1197" height="242" rx="20.5" fill="none" stroke="#E2E8F0" stroke-width="3"/>
</svg>
