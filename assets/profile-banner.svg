      <path d="M131 92L173 217M227 137L282 237M300 53L227 137M364 146L300 53"/>
      <path d="M48 189L227 137L364 146"/>
    </g>
    <g fill="#E0F2FE">
      <circle cx="48" cy="189" r="8"/>
      <circle cx="131" cy="92" r="8"/>
      <circle cx="227" cy="137" r="9"/>
